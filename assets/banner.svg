<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320" role="img" aria-label="Jyothisai Mekala — DevOps / DevSecOps Engineer">
  <defs>
    <!-- Base background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070A1F"/>
      <stop offset="55%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#0C0822"/>
    </linearGradient>
 
    <!-- Coloured blobs behind the glass -->
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
 
    <!-- Frosted panel fill + top highlight -->
    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
 
    <!-- Heavy blur for the glass-backdrop blobs -->
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDev="48"/>
    </filter>
    <!-- Neon glow for accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDev="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
 
    <clipPath id="round"><rect x="0" y="0" width="1000" height="320" rx="0"/></clipPath>
 
    <style>
      .drift1 { animation: d1 14s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .drift2 { animation: d2 18s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .drift3 { animation: d3 16s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .twinkle { animation: tw 4s ease-in-out infinite; }
      .twinkle.b { animation-duration: 5.5s; animation-delay: .8s; }
      .twinkle.c { animation-duration: 6.5s; animation-delay: 1.6s; }
      .rise { animation: rise 9s linear infinite; }
      .rise.b { animation-duration: 11s; animation-delay: 2s; }
      .rise.c { animation-duration: 13s; animation-delay: 4s; }
      @keyframes d1 { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,-26px) scale(1.12); } }
      @keyframes d2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-46px,22px) scale(1.1); } }
      @keyframes d3 { from { transform: translate(0,0) scale(1); } to { transform: translate(28px,30px) scale(1.15); } }
      @keyframes tw { 0%,100% { opacity:.25; } 50% { opacity:1; } }
      @keyframes rise { 0% { opacity:0; transform: translateY(0); } 12% { opacity:.9; } 100% { opacity:0; transform: translateY(-120px); } }
      @media (prefers-reduced-motion: reduce) {
        .drift1,.drift2,.drift3,.twinkle,.rise { animation: none; }
      }
    </style>
  </defs>
 
  <g clip-path="url(#round)">
    <rect width="1000" height="320" fill="url(#bg)"/>
 
    <!-- subtle grid -->
    <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1">
      <path d="M0 80 H1000 M0 160 H1000 M0 240 H1000"/>
      <path d="M200 0 V320 M400 0 V320 M600 0 V320 M800 0 V320"/>
    </g>
 
    <!-- blurred colour blobs (the light that the glass refracts) -->
    <g filter="url(#soft)">
      <circle class="drift1" cx="210" cy="120" r="150" fill="url(#blobViolet)"/>
      <circle class="drift2" cx="780" cy="210" r="170" fill="url(#blobCyan)"/>
      <circle class="drift3" cx="560" cy="70"  r="130" fill="url(#blobPink)"/>
    </g>
 
    <!-- floating particles -->
    <g fill="#00D4FF">
      <circle class="rise"   cx="120" cy="280" r="2.2"/>
      <circle class="rise b" cx="470" cy="290" r="1.8" fill="#F472B6"/>
      <circle class="rise c" cx="880" cy="285" r="2.4" fill="#7C3AED"/>
      <circle class="rise b" cx="690" cy="295" r="1.6"/>
    </g>
 
    <!-- FROSTED GLASS PANEL -->
    <g>
      <rect x="56" y="56" width="888" height="208" rx="28" fill="url(#glassFill)" stroke="url(#glassStroke)" stroke-width="1.5"/>
      <!-- top sheen -->
      <rect x="78" y="70" width="844" height="2" rx="1" fill="#FFFFFF" opacity="0.35"/>
    </g>
 
    <!-- twinkle stars inside panel -->
    <g fill="#FFFFFF">
      <circle class="twinkle"   cx="900" cy="90"  r="1.6"/>
      <circle class="twinkle b" cx="120" cy="220" r="1.4"/>
      <circle class="twinkle c" cx="860" cy="230" r="1.5"/>
    </g>
 
    <!-- availability chip -->
    <g transform="translate(92,92)">
      <rect x="0" y="0" width="234" height="30" rx="15" fill="#00D4FF" fill-opacity="0.10" stroke="#00D4FF" stroke-opacity="0.45" stroke-width="1"/>
      <circle cx="18" cy="15" r="4" fill="#34D399" filter="url(#glow)"/>
      <text x="34" y="20" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="12.5" letter-spacing="1.4" font-weight="600" fill="#9BE7FF">Open to Work</text>
    </g>
 
    <!-- Name -->
    <text x="90" y="178" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="1.5" fill="#F4F8FF">JYOTHISAI MEKALA</text>
 
    <!-- glowing accent underline -->
    <rect x="92" y="192" width="300" height="3.5" rx="2" fill="url(#accentLine)" filter="url(#glow)"/>
 
    <!-- Role -->
    <text x="92" y="226" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="22" font-weight="600" fill="#00D4FF">DevOps / DevSecOps Engineer</text>
 
    <!-- subline -->
    <text x="92" y="250" font-family="'SF Mono','Cascadia Code', ui-monospace, 'Consolas', monospace" font-size="13.5" letter-spacing="0.6" fill="#AEB6D8">4+ yrs · AWS · Kubernetes · Terraform · CI/CD · DevSecOps</text>
 
    <!-- right-side glass monogram -->
    <g transform="translate(792,96)">
      <rect x="0" y="0" width="120" height="120" rx="24" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="60" y="58" text-anchor="middle" font-family="'SF Mono', ui-monospace, monospace" font-size="14" letter-spacing="2" fill="#7C3AED">&lt;/&gt;</text>
      <text x="60" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="34" font-weight="800" fill="#F4F8FF" filter="url(#glow)">JM</text>
    </g>
  </g>
</svg>
